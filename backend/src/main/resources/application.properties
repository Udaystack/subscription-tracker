spring.application.name=subscription-tracker

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/subscriptiondb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# AWS
aws.region=${AWS_REGION:us-east-1}
aws.sns.topic.arn=${SNS_TOPIC_ARN:arn:aws:sns:us-east-1:000000000000:subscription-alerts}
aws.lambda.function.name=${LAMBDA_FUNCTION_NAME:subscription-renewal-checker}

# JWT
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-in-production}
jwt.expiration=86400000

# Server
server.port=8080
